<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Compteur Simple</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
import { useState } from "react";

export default function App() {
  const [count, setCount] = useState(0);

  const increment = () => setCount(c => c + 1);
  const decrement = () => setCount(c => c - 1);
  const reset = () => setCount(0);

  const getColor = () => {
    if (count > 0) return "#4ade80";
    if (count < 0) return "#f87171";
    return "#e2e8f0";
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0f172a",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      fontFamily: "'Segoe UI', sans-serif"
    }}>
      <div style={{
        background: "#1e293b",
        borderRadius: "24px",
        padding: "48px 64px",
        boxShadow: "0 25px 50px rgba(0,0,0,0.5)",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        gap: "32px"
      }}>
        <h1 style={{ color: "#94a3b8", fontSize: "18px", letterSpacing: "4px", textTransform: "uppercase", margin: 0 }}>Compteur</h1>

        <div style={{
          fontSize: "96px",
          fontWeight: "800",
          color: getColor(),
          transition: "color 0.3s ease",
          minWidth: "180px",
          textAlign: "center",
          lineHeight: 1
        }}>
          {count}
        </div>

        <div style={{ display: "flex", gap: "16px", alignItems: "center" }}>
          <button
            onClick={decrement}
            style={{
              width: "64px",
              height: "64px",
              borderRadius: "50%",
              border: "none",
              background: "#f87171",
              color: "white",
              fontSize: "32px",
              fontWeight: "bold",
              cursor: "pointer",
              boxShadow: "0 4px 15px rgba(248,113,113,0.4)",
              transition: "transform 0.1s, box-shadow 0.1s",
              display: "flex",
              alignItems: "center",
              justifyContent: "center"
            }}
            onMouseDown={e => e.currentTarget.style.transform = "scale(0.92)"}
            onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
          >−</button>

          <button
            onClick={reset}
            style={{
              padding: "10px 20px",
              borderRadius: "12px",
              border: "2px solid #334155",
              background: "transparent",
              color: "#64748b",
              fontSize: "13px",
              letterSpacing: "2px",
              textTransform: "uppercase",
              cursor: "pointer",
              transition: "all 0.2s"
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = "#64748b"; e.currentTarget.style.color = "#94a3b8"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#334155"; e.currentTarget.style.color = "#64748b"; }}
          >Reset</button>

          <button
            onClick={increment}
            style={{
              width: "64px",
              height: "64px",
              borderRadius: "50%",
              border: "none",
              background: "#4ade80",
              color: "white",
              fontSize: "32px",
              fontWeight: "bold",
              cursor: "pointer",
              boxShadow: "0 4px 15px rgba(74,222,128,0.4)",
              transition: "transform 0.1s, box-shadow 0.1s",
              display: "flex",
              alignItems: "center",
              justifyContent: "center"
            }}
            onMouseDown={e => e.currentTarget.style.transform = "scale(0.92)"}
            onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
          >+</button>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body></html>
