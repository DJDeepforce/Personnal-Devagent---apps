<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Compteur Simple</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
function App() {
  const [count, setCount] = React.useState(0);

  const increment = () => setCount(c => c + 1);
  const decrement = () => setCount(c => c - 1);
  const reset = () => setCount(0);

  const getColor = () => {
    if (count > 0) return '#4ade80';
    if (count < 0) return '#f87171';
    return '#e2e8f0';
  };

  return (
    <div style={{
      minHeight: '100vh',
      backgroundColor: '#0f172a',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      fontFamily: 'sans-serif'
    }}>
      <div style={{
        backgroundColor: '#1e293b',
        borderRadius: '24px',
        padding: '48px 64px',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: '32px',
        boxShadow: '0 25px 50px rgba(0,0,0,0.5)'
      }}>
        <h1 style={{ color: '#94a3b8', margin: 0, fontSize: '20px', letterSpacing: '3px', textTransform: 'uppercase' }}>Compteur</h1>

        <div style={{
          fontSize: '96px',
          fontWeight: 'bold',
          color: getColor(),
          minWidth: '200px',
          textAlign: 'center',
          transition: 'color 0.3s ease',
          lineHeight: 1
        }}>
          {count}
        </div>

        <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
          <button
            onClick={decrement}
            style={{
              width: '72px',
              height: '72px',
              borderRadius: '50%',
              border: 'none',
              backgroundColor: '#ef4444',
              color: 'white',
              fontSize: '36px',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              transition: 'transform 0.1s, opacity 0.2s',
              boxShadow: '0 4px 15px rgba(239,68,68,0.4)'
            }}
            onMouseEnter={e => e.target.style.opacity = '0.85'}
            onMouseLeave={e => e.target.style.opacity = '1'}
            onMouseDown={e => e.target.style.transform = 'scale(0.92)'}
            onMouseUp={e => e.target.style.transform = 'scale(1)'}
          >−</button>

          <button
            onClick={reset}
            style={{
              padding: '10px 20px',
              borderRadius: '12px',
              border: '2px solid #475569',
              backgroundColor: 'transparent',
              color: '#94a3b8',
              fontSize: '13px',
              cursor: 'pointer',
              letterSpacing: '1px',
              textTransform: 'uppercase',
              transition: 'border-color 0.2s, color 0.2s'
            }}
            onMouseEnter={e => { e.target.style.borderColor = '#94a3b8'; e.target.style.color = '#e2e8f0'; }}
            onMouseLeave={e => { e.target.style.borderColor = '#475569'; e.target.style.color = '#94a3b8'; }}
          >Reset</button>

          <button
            onClick={increment}
            style={{
              width: '72px',
              height: '72px',
              borderRadius: '50%',
              border: 'none',
              backgroundColor: '#22c55e',
              color: 'white',
              fontSize: '36px',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              transition: 'transform 0.1s, opacity 0.2s',
              boxShadow: '0 4px 15px rgba(34,197,94,0.4)'
            }}
            onMouseEnter={e => e.target.style.opacity = '0.85'}
            onMouseLeave={e => e.target.style.opacity = '1'}
            onMouseDown={e => e.target.style.transform = 'scale(0.92)'}
            onMouseUp={e => e.target.style.transform = 'scale(1)'}
          >+</button>
        </div>
      </div>
    </div>
  );
}
try { ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App)); } catch(e) { document.getElementById("root").innerHTML = "<div style=color:red;padding:20px>Erreur: " + e.message + "</div>"; }
  </script>
</body></html>
