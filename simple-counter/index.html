<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Simple Counter</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
import { useState } from "react";

export default function App() {
  const [count, setCount] = useState(0);

  const increment = () => setCount(c => c + 1);
  const decrement = () => setCount(c => c - 1);
  const reset = () => setCount(0);

  const getColor = () => {
    if (count > 0) return "#4ade80";
    if (count < 0) return "#f87171";
    return "#e2e8f0";
  };

  return (
    <div style={{
      minHeight: "100vh",
      backgroundColor: "#0f172a",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      fontFamily: "'Segoe UI', sans-serif"
    }}>
      <div style={{
        backgroundColor: "#1e293b",
        borderRadius: "24px",
        padding: "48px 64px",
        boxShadow: "0 25px 50px rgba(0,0,0,0.5)",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        gap: "32px"
      }}>
        <h1 style={{ color: "#94a3b8", fontSize: "18px", letterSpacing: "4px", textTransform: "uppercase", margin: 0 }}>Compteur</h1>

        <div style={{
          fontSize: "96px",
          fontWeight: "800",
          color: getColor(),
          transition: "color 0.3s ease",
          minWidth: "180px",
          textAlign: "center",
          lineHeight: 1
        }}>
          {count}
        </div>

        <div style={{ display: "flex", gap: "16px", alignItems: "center" }}>
          <button
            onClick={decrement}
            style={{
              width: "64px",
              height: "64px",
              borderRadius: "50%",
              border: "none",
              backgroundColor: "#ef4444",
              color: "white",
              fontSize: "32px",
              fontWeight: "bold",
              cursor: "pointer",
              transition: "transform 0.1s, background-color 0.2s",
              boxShadow: "0 4px 15px rgba(239,68,68,0.4)"
            }}
            onMouseEnter={e => e.target.style.backgroundColor = "#dc2626"}
            onMouseLeave={e => e.target.style.backgroundColor = "#ef4444"}
            onMouseDown={e => e.target.style.transform = "scale(0.92)"}
            onMouseUp={e => e.target.style.transform = "scale(1)"}
          >−</button>

          <button
            onClick={reset}
            style={{
              padding: "10px 20px",
              borderRadius: "12px",
              border: "1px solid #334155",
              backgroundColor: "#0f172a",
              color: "#64748b",
              fontSize: "13px",
              letterSpacing: "2px",
              textTransform: "uppercase",
              cursor: "pointer",
              transition: "color 0.2s, border-color 0.2s"
            }}
            onMouseEnter={e => { e.target.style.color = "#e2e8f0"; e.target.style.borderColor = "#64748b"; }}
            onMouseLeave={e => { e.target.style.color = "#64748b"; e.target.style.borderColor = "#334155"; }}
          >Reset</button>

          <button
            onClick={increment}
            style={{
              width: "64px",
              height: "64px",
              borderRadius: "50%",
              border: "none",
              backgroundColor: "#22c55e",
              color: "white",
              fontSize: "32px",
              fontWeight: "bold",
              cursor: "pointer",
              transition: "transform 0.1s, background-color 0.2s",
              boxShadow: "0 4px 15px rgba(34,197,94,0.4)"
            }}
            onMouseEnter={e => e.target.style.backgroundColor = "#16a34a"}
            onMouseLeave={e => e.target.style.backgroundColor = "#22c55e"}
            onMouseDown={e => e.target.style.transform = "scale(0.92)"}
            onMouseUp={e => e.target.style.transform = "scale(1)"}
          >+</button>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body></html>
