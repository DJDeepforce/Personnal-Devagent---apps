<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Simple Counter</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
import { useState } from "react";

export default function App() {
  const [count, setCount] = useState(0);

  const increment = () => setCount(c => c + 1);
  const decrement = () => setCount(c => c - 1);
  const reset = () => setCount(0);

  const getColor = () => {
    if (count > 0) return "#4ade80";
    if (count < 0) return "#f87171";
    return "#e2e8f0";
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      fontFamily: "'Segoe UI', sans-serif"
    }}>
      <div style={{
        background: "rgba(255,255,255,0.05)",
        backdropFilter: "blur(10px)",
        borderRadius: "24px",
        border: "1px solid rgba(255,255,255,0.1)",
        padding: "60px 80px",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        gap: "40px",
        boxShadow: "0 25px 50px rgba(0,0,0,0.4)"
      }}>
        <h1 style={{ color: "#94a3b8", fontSize: "1.2rem", letterSpacing: "0.2em", textTransform: "uppercase", margin: 0 }}>Compteur</h1>

        <div style={{
          fontSize: "7rem",
          fontWeight: "700",
          color: getColor(),
          transition: "color 0.3s ease",
          lineHeight: 1,
          minWidth: "180px",
          textAlign: "center",
          textShadow: `0 0 40px ${getColor()}55`
        }}>
          {count}
        </div>

        <div style={{ display: "flex", gap: "20px", alignItems: "center" }}>
          <button onClick={decrement} style={{
            width: "70px",
            height: "70px",
            borderRadius: "50%",
            border: "2px solid #f87171",
            background: "rgba(248,113,113,0.1)",
            color: "#f87171",
            fontSize: "2rem",
            cursor: "pointer",
            transition: "all 0.2s ease",
            display: "flex",
            alignItems: "center",
            justifyContent: "center"
          }}
          onMouseEnter={e => { e.target.style.background = "rgba(248,113,113,0.3)"; e.target.style.transform = "scale(1.1)"; }}
          onMouseLeave={e => { e.target.style.background = "rgba(248,113,113,0.1)"; e.target.style.transform = "scale(1)"; }}
          >−</button>

          <button onClick={reset} style={{
            padding: "10px 24px",
            borderRadius: "12px",
            border: "2px solid #475569",
            background: "rgba(71,85,105,0.2)",
            color: "#94a3b8",
            fontSize: "0.85rem",
            cursor: "pointer",
            letterSpacing: "0.1em",
            textTransform: "uppercase",
            transition: "all 0.2s ease"
          }}
          onMouseEnter={e => { e.target.style.background = "rgba(71,85,105,0.5)"; e.target.style.color = "#e2e8f0"; }}
          onMouseLeave={e => { e.target.style.background = "rgba(71,85,105,0.2)"; e.target.style.color = "#94a3b8"; }}
          >Reset</button>

          <button onClick={increment} style={{
            width: "70px",
            height: "70px",
            borderRadius: "50%",
            border: "2px solid #4ade80",
            background: "rgba(74,222,128,0.1)",
            color: "#4ade80",
            fontSize: "2rem",
            cursor: "pointer",
            transition: "all 0.2s ease",
            display: "flex",
            alignItems: "center",
            justifyContent: "center"
          }}
          onMouseEnter={e => { e.target.style.background = "rgba(74,222,128,0.3)"; e.target.style.transform = "scale(1.1)"; }}
          onMouseLeave={e => { e.target.style.background = "rgba(74,222,128,0.1)"; e.target.style.transform = "scale(1)"; }}
          >+</button>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body></html>
