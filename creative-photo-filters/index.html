<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Creative Photo Filters</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
function App() {
  const [image, setImage] = React.useState(null);
  const [filter, setFilter] = React.useState('glitch');
  const [intensity, setIntensity] = React.useState(50);
  const canvasRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const animRef = React.useRef(null);

  const filters = [
    { id: 'glitch', label: '⚡ Glitch' },
    { id: 'vhs', label: '📼 VHS' },
    { id: 'neon', label: '🌟 Neon' },
    { id: 'kaleidoscope', label: '🔮 Kaleidoscope' },
    { id: 'hologram', label: '💿 Hologram' },
  ];

  const applyFilter = React.useCallback(() => {
    if (!imgRef.current || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const img = imgRef.current;
    const W = canvas.width, H = canvas.height;
    const t = intensity / 100;
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    const id = ctx.getImageData(0, 0, W, H);
    const d = id.data;

    if (filter === 'glitch') {
      const shift = Math.floor(t * 30);
      for (let y = 0; y < H; y++) {
        if (Math.random() < t * 0.3) {
          const dx = Math.floor((Math.random() - 0.5) * shift * 2);
          for (let x = 0; x < W; x++) {
            const i = (y * W + x) * 4;
            const sx = Math.min(Math.max(x + dx, 0), W - 1);
            const si = (y * W + sx) * 4;
            d[i] = d[si]; d[i+3] = d[si+3];
          }
        }
      }
      const rb = Math.floor(t * 15);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const i = (y * W + x) * 4;
          const rx = Math.min(x + rb, W - 1), bx = Math.max(x - rb, 0);
          const ri = (y * W + rx) * 4, bi = (y * W + bx) * 4;
          d[i] = d[ri]; d[i+2] = d[bi];
        }
      }
    } else if (filter === 'vhs') {
      for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * t * 60;
        d[i] = Math.min(255, Math.max(0, d[i] * (1 - t * 0.3) + n));
        d[i+1] = Math.min(255, Math.max(0, d[i+1] * (1 - t * 0.3) + n));
        d[i+2] = Math.min(255, Math.max(0, d[i+2] * (1 - t * 0.3) + n));
      }
      ctx.putImageData(id, 0, 0);
      for (let y = 0; y < H; y += 3) {
        ctx.fillStyle = `rgba(0,0,0,${t * 0.25})`;
        ctx.fillRect(0, y, W, 1);
      }
      return;
    } else if (filter === 'neon') {
      for (let i = 0; i < d.length; i += 4) {
        const avg = (d[i] + d[i+1] + d[i+2]) / 3;
        const edge = avg > 80 ? 255 : 0;
        d[i] = Math.min(255, edge * t + d[i] * (1 - t) * 0.2);
        d[i+1] = Math.min(255, d[i+1] * (1 - t) * 0.1 + (avg > 120 ? 200 * t : 0));
        d[i+2] = Math.min(255, d[i+2] * 0.3 + (avg > 60 ? 255 * t : 0));
      }
    } else if (filter === 'kaleidoscope') {
      const segs = 8;
      ctx.putImageData(id, 0, 0);
      const offscreen = document.createElement('canvas');
      offscreen.width = W; offscreen.height = H;
      const oc = offscreen.getContext('2d');
      oc.drawImage(canvas, 0, 0);
      ctx.clearRect(0, 0, W, H);
      const cx = W / 2, cy = H / 2;
      for (let s = 0; s < segs; s++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((s * Math.PI * 2) / segs);
        if (s % 2 === 1) ctx.scale(-1, 1);
        ctx.globalAlpha = 0.5 + t * 0.5;
        ctx.drawImage(offscreen, -cx, -cy);
        ctx.restore();
      }
      return;
    } else if (filter === 'hologram') {
      for (let i = 0; i < d.length; i += 4) {
        const x = (i / 4) % W, y = Math.floor(i / 4 / W);
        const hue = (x + y) % 360;
        const r2 = Math.sin(hue * Math.PI / 180) * 127 + 128;
        const g2 = Math.sin((hue + 120) * Math.PI / 180) * 127 + 128;
        const b2 = Math.sin((hue + 240) * Math.PI / 180) * 127 + 128;
        d[i] = d[i] * (1 - t * 0.6) + r2 * t * 0.6;
        d[i+1] = d[i+1] * (1 - t * 0.6) + g2 * t * 0.6;
        d[i+2] = d[i+2] * (1 - t * 0.6) + b2 * t * 0.6;
        if (y % 4 === 0) { d[i] *= 0.7; d[i+1] *= 0.7; d[i+2] *= 0.7; }
      }
    }
    ctx.putImageData(id, 0, 0);
  }, [filter, intensity, image]);

  React.useEffect(() => {
    if (!image) return;
    const img = new Image();
    img.onload = () => { imgRef.current = img; applyFilter(); };
    img.src = image;
  }, [image]);

  React.useEffect(() => { if (imgRef.current) applyFilter(); }, [applyFilter]);

  const handleUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImage(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleDownload = () => {
    const a = document.createElement('a');
    a.href = canvasRef.current.toDataURL('image/png');
    a.download = `filtered_${filter}.png`;
    a.click();
  };

  const s = {
    app: { minHeight: '100vh', background: 'linear-gradient(135deg, #0a0010 0%, #1a0030 50%, #0d0020 100%)', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '24px', fontFamily: 'system-ui, sans-serif', color: '#e0d0ff' },
    title: { fontSize: 28, fontWeight: 800, background: 'linear-gradient(90deg, #bf7fff, #ff7fff, #7fbfff)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: 4 },
    sub: { color: '#8060aa', fontSize: 13, marginBottom: 20 },
    upload: { background: 'linear-gradient(135deg, #2a0050, #1a003a)', border: '2px dashed #6030aa', borderRadius: 16, padding: '28px 40px', cursor: 'pointer', textAlign: 'center', marginBottom: 20, fontSize: 15, color: '#c090ff', transition: 'all 0.2s' },
    filterRow: { display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', justifyContent: 'center' },
    btn: (active) => ({ padding: '8px 16px', borderRadius: 20, border: active ? '2px solid #bf7fff' : '2px solid #3a1060', background: active ? 'linear-gradient(135deg, #5010a0, #800080)' : '#1a0030', color: active ? '#fff' : '#9060c0', cursor: 'pointer', fontWeight: 700, fontSize: 13, transition: 'all 0.2s' }),
    slider: { width: 280, accentColor: '#bf7fff', margin: '0 12px' },
    canvas: { borderRadius: 12, border: '2px solid #4020 80', boxShadow: '0 0 40px #8000ff44', maxWidth: '100%', marginBottom: 16 },
    dl: { padding: '10px 28px', borderRadius: 24, background: 'linear-gradient(135deg, #7000cc, #cc00aa)', color: '#fff', fontWeight: 700, fontSize: 15, cursor: 'pointer', border: 'none', boxShadow: '0 0 20px #8800ff88' },
  };

  return (
    <div style={s.app}>
      <div style={s.title}>✨ Creative Filters</div>
      <div style={s.sub}>Upload · Apply · Download</div>
      <label style={s.upload}>
        <input type="file" accept="image/*" onChange={handleUpload} style={{ display: 'none' }} />
        {image ? '🖼️ Image loaded — click to change' : '📁 Click to upload an image'}
      </label>
      <div style={s.filterRow}>
        {filters.map(f => <button key={f.id} style={s.btn(filter === f.id)} onClick={() => setFilter(f.id)}>{f.label}</button>)}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 18, color: '#c090ff', fontSize: 14 }}>
        <span>Intensity</span>
        <input type="range" min={0} max={100} value={intensity} onChange={e => setIntensity(+e.target.value)} style={s.slider} />
        <span style={{ minWidth: 32, textAlign: 'right', fontWeight: 700, color: '#e0b0ff' }}>{intensity}%</span>
      </div>
      {image
        ? <canvas ref={canvasRef} width={480} height={360} style={s.canvas} />
        : <div style={{ width: 480, height: 240, borderRadius: 12, background: '#10002a', border: '2px solid #2a0050', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#4a2070', fontSize: 18, marginBottom: 16 }}>No image yet</div>
      }
      {image && <button style={s.dl} onClick={handleDownload}>⬇️ Download Result</button>}
      <canvas ref={(c) => { if (c && !canvasRef.current) canvasRef.current = c; }} style={{ display: 'none' }} />
    </div>
  );
}
try { ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App)); } catch(e) { document.getElementById("root").innerHTML = "<div style=color:red;padding:20px>Erreur: " + e.message + "</div>"; }
  </script>
</body></html>
