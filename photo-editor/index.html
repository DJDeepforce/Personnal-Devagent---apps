<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Photo Editor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080c10}</style>
</head><body>
  <div id="root"></div>
  <script type="text/babel">
function App() {
  const canvasRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const [filters, setFilters] = React.useState({ brightness: 100, contrast: 100, saturation: 100, hue: 0, blur: 0 });
  const [hasImage, setHasImage] = React.useState(false);

  const applyFilters = React.useCallback(() => {
    const canvas = canvasRef.current;
    const img = imgRef.current;
    if (!canvas || !img) return;
    const ctx = canvas.getContext('2d');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.filter = `brightness(${filters.brightness}%) contrast(${filters.contrast}%) saturate(${filters.saturation}%) hue-rotate(${filters.hue}deg) blur(${filters.blur}px)`;
    ctx.drawImage(img, 0, 0);
  }, [filters]);

  React.useEffect(() => { if (hasImage) applyFilters(); }, [filters, hasImage, applyFilters]);

  const handleUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { imgRef.current = img; setHasImage(true); };
    img.src = url;
  };

  const setPreset = (preset) => {
    const p = { brightness: 100, contrast: 100, saturation: 100, hue: 0, blur: 0 };
    if (preset === 'bw') setFilters({ ...p, saturation: 0 });
    else if (preset === 'sepia') setFilters({ ...p, saturation: 30, brightness: 105, contrast: 90, hue: 30 });
    else if (preset === 'vintage') setFilters({ ...p, brightness: 90, contrast: 85, saturation: 70, hue: 15, blur: 0.5 });
    else if (preset === 'vivid') setFilters({ ...p, brightness: 110, contrast: 120, saturation: 160 });
    else setFilters(p);
  };

  const download = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = 'edited-photo.png';
    a.href = canvas.toDataURL();
    a.click();
  };

  const sliders = [
    { key: 'brightness', label: 'Luminosité', min: 0, max: 200, unit: '%' },
    { key: 'contrast', label: 'Contraste', min: 0, max: 200, unit: '%' },
    { key: 'saturation', label: 'Saturation', min: 0, max: 300, unit: '%' },
    { key: 'hue', label: 'Teinte', min: -180, max: 180, unit: '°' },
    { key: 'blur', label: 'Flou', min: 0, max: 20, unit: 'px' },
  ];

  const s = {
    wrap: { display: 'flex', flexDirection: 'column', alignItems: 'center', minHeight: '100vh', background: '#0f0f13', color: '#e0e0f0', fontFamily: 'sans-serif', padding: '24px 16px' },
    title: { fontSize: 26, fontWeight: 700, marginBottom: 20, background: 'linear-gradient(90deg,#a78bfa,#60a5fa)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' },
    main: { display: 'flex', gap: 24, width: '100%', maxWidth: 960, flexWrap: 'wrap', justifyContent: 'center' },
    panel: { background: '#1a1a2e', borderRadius: 16, padding: 20, width: 280, display: 'flex', flexDirection: 'column', gap: 14 },
    canvasWrap: { flex: 1, minWidth: 300, background: '#1a1a2e', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 12, minHeight: 300 },
    canvas: { maxWidth: '100%', maxHeight: 420, borderRadius: 10, display: hasImage ? 'block' : 'none' },
    placeholder: { color: '#555', fontSize: 14, textAlign: 'center' },
    upload: { background: 'linear-gradient(135deg,#7c3aed,#2563eb)', border: 'none', color: '#fff', padding: '10px 0', borderRadius: 10, cursor: 'pointer', fontWeight: 600, fontSize: 14 },
    sliderWrap: { display: 'flex', flexDirection: 'column', gap: 4 },
    label: { display: 'flex', justifyContent: 'space-between', fontSize: 13, color: '#a0a0c0' },
    slider: { width: '100%', accentColor: '#a78bfa' },
    presets: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 },
    preset: (c) => ({ background: c, border: 'none', color: '#fff', padding: '8px 0', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: 13 }),
    download: { background: hasImage ? 'linear-gradient(135deg,#059669,#0891b2)' : '#333', border: 'none', color: '#fff', padding: '10px 0', borderRadius: 10, cursor: hasImage ? 'pointer' : 'not-allowed', fontWeight: 600, fontSize: 14, marginTop: 4 },
    reset: { background: 'none', border: '1px solid #444', color: '#aaa', padding: '7px 0', borderRadius: 10, cursor: 'pointer', fontSize: 13 },
  };

  return (
    <div style={s.wrap}>
      <div style={s.title}>✦ Photo Editor</div>
      <div style={s.main}>
        <div style={s.panel}>
          <button style={s.upload} onClick={() => fileRef.current.click()}>📁 Importer une image</button>
          <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleUpload} />
          {sliders.map(sl => (
            <div key={sl.key} style={s.sliderWrap}>
              <div style={s.label}><span>{sl.label}</span><span>{filters[sl.key]}{sl.unit}</span></div>
              <input type="range" style={s.slider} min={sl.min} max={sl.max} value={filters[sl.key]}
                onChange={e => setFilters(f => ({ ...f, [sl.key]: Number(e.target.value) }))} />
            </div>
          ))}
          <div style={{ fontSize: 12, color: '#666', marginTop: 4 }}>PRESETS</div>
          <div style={s.presets}>
            <button style={s.preset('linear-gradient(135deg,#374151,#111827)')} onClick={() => setPreset('bw')}>Noir & Blanc</button>
            <button style={s.preset('linear-gradient(135deg,#92400e,#78350f)')} onClick={() => setPreset('sepia')}>Sépia</button>
            <button style={s.preset('linear-gradient(135deg,#7c3aed,#db2777)')} onClick={() => setPreset('vintage')}>Vintage</button>
            <button style={s.preset('linear-gradient(135deg,#0891b2,#16a34a)')} onClick={() => setPreset('vivid')}>Vivid</button>
          </div>
          <button style={s.reset} onClick={() => setPreset('reset')}>↺ Réinitialiser</button>
          <button style={s.download} onClick={download} disabled={!hasImage}>⬇ Télécharger</button>
        </div>
        <div style={s.canvasWrap}>
          {!hasImage && <div style={s.placeholder}>📷<br/>Importez une image<br/>pour commencer</div>}
          <canvas ref={canvasRef} style={s.canvas} />
        </div>
      </div>
    </div>
  );
}
try { ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App)); } catch(e) { document.getElementById("root").innerHTML = "<div style=color:red;padding:20px>Erreur: " + e.message + "</div>"; }
  </script>
</body></html>
